<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product | Trout Pro Store</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cellipse cx='30' cy='32' rx='22' ry='11' fill='%23c8860a'/%3E%3Cellipse cx='30' cy='35' rx='18' ry='6' fill='%23e8b84a'/%3E%3Cpath d='M52 32 L62 22 L64 32 L62 42 Z' fill='%23a06020'/%3E%3Ccircle cx='12' cy='31' r='3' fill='%23111'/%3E%3Ccircle cx='11' cy='30' r='1' fill='white'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+4:wght@300;400;600&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .product-detail{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start;max-width:1100px;margin:0 auto;padding:64px 40px}
    .product-detail-img{aspect-ratio:1;background:var(--cream);border:1px solid var(--border);overflow:hidden}
    .product-detail-img img{width:100%;height:100%;object-fit:cover}
    .product-detail-img .no-img{display:flex;align-items:center;justify-content:center;height:100%;color:var(--stone);font-family:'Fira Mono',monospace;font-size:.8rem}
    .product-detail-cat{font-family:'Fira Mono',monospace;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--river-light);margin-bottom:12px}
    .product-detail-name{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,3vw,2.8rem);font-weight:900;color:var(--forest);line-height:1.15;margin-bottom:16px}
    .product-detail-price{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;color:var(--forest);margin-bottom:24px}
    .product-detail-desc{font-size:1rem;color:var(--text-muted);line-height:1.8;margin-bottom:32px;max-height:400px;overflow-y:auto;padding-right:8px;white-space:pre-line}
    .size-section{margin-bottom:28px}
    .size-label{font-family:'Fira Mono',monospace;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);margin-bottom:12px;display:flex;align-items:center;gap:10px}
    .size-label span{color:var(--forest);font-weight:600}
    .size-grid{display:flex;flex-wrap:wrap;gap:8px}
    .size-btn{padding:9px 18px;border:1.5px solid var(--border);background:var(--white);font-family:'Fira Mono',monospace;font-size:.8rem;cursor:pointer;transition:all .2s;color:var(--text);border-radius:2px;min-width:52px;text-align:center}
    .size-btn:hover{border-color:var(--forest);background:var(--cream)}
    .size-btn.selected{border-color:var(--forest);background:var(--forest);color:var(--cream)}
    .size-required{color:#c85040;font-family:'Fira Mono',monospace;font-size:.74rem;margin-top:8px;display:none}
    .qty-row{display:flex;align-items:center;gap:16px;margin-bottom:24px}
    .qty-label{font-family:'Fira Mono',monospace;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--stone)}
    .qty-input{width:64px;padding:10px;text-align:center;border:1.5px solid var(--border);font-family:'Source Serif 4',serif;font-size:1rem;outline:none;border-radius:2px}
    .breadcrumb{padding:16px 40px;max-width:1100px;margin:0 auto;font-family:'Fira Mono',monospace;font-size:.72rem;color:var(--stone)}
    .breadcrumb a{color:var(--river-light)}
    .breadcrumb a:hover{color:var(--gold)}
    @media(max-width:768px){.product-detail{grid-template-columns:1fr;gap:32px;padding:32px 20px}.breadcrumb{padding:12px 20px}}
  </style>
</head>
<body>

<div id="header-mount"></div>

<div id="product-mount">
  <div class="loading" style="padding:100px 20px"><div class="spinner"></div>Loading product…</div>
</div>

<div id="footer-mount"></div>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
  document.getElementById('header-mount').innerHTML = renderHeader('Shop');
  document.getElementById('footer-mount').innerHTML = renderFooter();
  initHeader();

  var id = new URLSearchParams(location.search).get('id');
  if (!id) { location.href = 'products.html'; }

  sbGet('products', 'id=eq.' + id + '&select=*').then(function(data) {
    if (!data.length) { location.href = 'products.html'; return; }
    var p = data[0];
    document.title = p.name + ' | Trout Pro Store';

    function buildOptions(p) {
      var opts = p.options;
      var html = '';

      /* Flies — hook sizes */
      if (p.sizes && p.sizes.length > 0) {
        html += '<div class="size-section">'
          + '<div class="size-label">Hook Size <span id="sel-label"></span></div>'
          + '<div class="size-grid">'
          + p.sizes.map(function(s){
              return '<button class="size-btn" data-size="'+esc(String(s))+'" onclick="selectHook(this)">'+esc(String(s))+'</button>';
            }).join('')
          + '</div>'
          + '<div class="size-required" id="size-required">Please select a hook size</div>'
          + '</div>';
        return html;
      }

      if (!opts) return '';

      /* Two-attribute selector: {attr1_label, attr1_values, attr2_label, attr2_values, prices} */
      if (opts.attr1_label) {
        html += '<div class="size-section">'
          + '<div class="size-label">'+esc(opts.attr1_label)+' <span id="sel-attr1" style="color:var(--forest);font-weight:600"></span></div>'
          + '<div class="size-grid" id="grid-attr1">'
          + (opts.attr1_values||[]).map(function(v){
              return '<button class="size-btn attr1-btn" data-val="'+esc(String(v))+'" onclick="selectAttr1(this)">'+esc(String(v))+'</button>';
            }).join('')
          + '</div></div>';
        if (opts.attr2_label) {
          html += '<div class="size-section" id="sec-attr2" style="opacity:.4;pointer-events:none">'
            + '<div class="size-label">'+esc(opts.attr2_label)+' <span id="sel-attr2" style="color:var(--forest);font-weight:600"></span></div>'
            + '<div class="size-grid" id="grid-attr2">'
            + (opts.attr2_values||[]).map(function(v){
                return '<button class="size-btn attr2-btn" data-val="'+esc(String(v))+'" onclick="selectAttr2(this)">'+esc(String(v))+'</button>';
              }).join('')
            + '</div></div>';
        }
        html += '<div class="size-required" id="size-required">Please select all options</div>';
        return html;
      }

      /* Single flat array [{option, price, image}] */
      if (Array.isArray(opts) && opts.length > 0) {
        var label = p.option_label || 'Option';
        html += '<div class="size-section">'
          + '<div class="size-label">'+esc(label)+' <span id="sel-label"></span></div>'
          + '<div class="size-grid">'
          + opts.map(function(o){
              var opt   = typeof o==='object' ? o.option : o;
              var price = typeof o==='object' ? o.price  : null;
              var img   = typeof o==='object' ? o.image  : null;
              var attrs = ' data-size="'+esc(String(opt))+'"';
              if (price) attrs += ' data-price="'+price+'"';
              if (img)   attrs += ' data-image="'+esc(img)+'"';
              var ptag  = (price && price !== p.price) ? ' <span style="font-family:Fira Mono,monospace;font-size:.7rem;color:var(--stone)">$'+Number(price).toFixed(2)+'</span>' : '';
              return '<button class="size-btn"'+attrs+' onclick="selectFlat(this)">'+esc(String(opt))+ptag+'</button>';
            }).join('')
          + '</div>'
          + '<div class="size-required" id="size-required">Please select an option</div>'
          + '</div>';
        return html;
      }

      return '';
    }

    document.getElementById('product-mount').innerHTML =
      '<div class="breadcrumb"><a href="/">Home</a> &rsaquo; <a href="/products.html">Shop</a> &rsaquo; '+esc(p.name)+'</div>'
      +'<div class="product-detail">'
      +'<div class="product-detail-img">'
      +(p.image_url ? '<img id="prod-img" src="'+p.image_url+'" alt="'+esc(p.name)+'" />' : '<div class="no-img">No image</div>')
      +'</div>'
      +'<div class="product-detail-info">'
      +'<div class="product-detail-cat">'+esc(p.category)+'</div>'
      +'<h1 class="product-detail-name">'+esc(p.name)+'</h1>'
      +'<div class="product-detail-price" id="prod-price">$'+Number(p.price).toFixed(2)+'</div>'
      +'<div class="product-detail-desc" style="white-space:normal">'+formatDesc(esc(p.description||''))+'</div>'
      +buildOptions(p)
      +'<div class="qty-row"><span class="qty-label">Qty</span><input type="number" class="qty-input" id="qty" value="1" min="1" max="99" /></div>'
      +'<button class="btn-primary" style="width:100%;text-align:center;padding:16px" onclick="handleAdd()">Add to Cart</button>'
      +'<a href="/products.html" style="display:block;text-align:center;margin-top:16px;font-family:Fira Mono,monospace;font-size:.76rem;color:var(--stone)">&larr; Back to Shop</a>'
      +'</div></div>';

    window.__product = p;
    window.__attr1 = null;
    window.__attr2 = null;
  });

  /* Hook size selector */
  function selectHook(btn) {
    document.querySelectorAll('.size-btn').forEach(function(b){b.classList.remove('selected');});
    btn.classList.add('selected');
    var lbl = document.getElementById('sel-label');
    if (lbl) lbl.textContent = '— '+btn.dataset.size;
    var req = document.getElementById('size-required');
    if (req) req.style.display = 'none';
    window.__product.selectedSize = btn.dataset.size;
  }

  /* Flat single-selector */
  function selectFlat(btn) {
    document.querySelectorAll('.size-btn').forEach(function(b){b.classList.remove('selected');});
    btn.classList.add('selected');
    var lbl = document.getElementById('sel-label');
    if (lbl) lbl.textContent = '— '+btn.dataset.size;
    var req = document.getElementById('size-required');
    if (req) req.style.display = 'none';
    window.__product.selectedSize = btn.dataset.size;
    if (btn.dataset.price) {
      var el = document.getElementById('prod-price');
      if (el) el.textContent = '$'+Number(btn.dataset.price).toFixed(2);
      window.__product.__selectedPrice = parseFloat(btn.dataset.price);
    }
    if (btn.dataset.image) swapImage(btn.dataset.image);
  }

  /* Two-attr selector — first attribute */
  function selectAttr1(btn) {
    document.querySelectorAll('.attr1-btn').forEach(function(b){b.classList.remove('selected');});
    btn.classList.add('selected');
    window.__attr1 = btn.dataset.val;
    var lbl = document.getElementById('sel-attr1');
    if (lbl) lbl.textContent = '— '+btn.dataset.val;
    /* Enable attr2 if it exists */
    var sec2 = document.getElementById('sec-attr2');
    if (sec2) { sec2.style.opacity='1'; sec2.style.pointerEvents='auto'; }
    /* Reset attr2 */
    document.querySelectorAll('.attr2-btn').forEach(function(b){b.classList.remove('selected');});
    window.__attr2 = null;
    var lbl2 = document.getElementById('sel-attr2');
    if (lbl2) lbl2.textContent = '';
    /* If no attr2, update price now */
    var opts = window.__product.options;
    if (opts && !opts.attr2_label) updateTwoAttrPrice();
    var req = document.getElementById('size-required');
    if (req) req.style.display = 'none';
  }

  /* Two-attr selector — second attribute */
  function selectAttr2(btn) {
    document.querySelectorAll('.attr2-btn').forEach(function(b){b.classList.remove('selected');});
    btn.classList.add('selected');
    window.__attr2 = btn.dataset.val;
    var lbl = document.getElementById('sel-attr2');
    if (lbl) lbl.textContent = '— '+btn.dataset.val;
    updateTwoAttrPrice();
    var req = document.getElementById('size-required');
    if (req) req.style.display = 'none';
  }

  function updateTwoAttrPrice() {
    var opts = window.__product.options;
    if (!opts || !opts.prices) return;
    var match = opts.prices.find(function(v){
      return v.attr1 === window.__attr1 && (!opts.attr2_label || v.attr2 === window.__attr2);
    });
    if (match) {
      var el = document.getElementById('prod-price');
      if (el) el.textContent = '$'+Number(match.price).toFixed(2);
      window.__product.__selectedPrice = match.price;
      if (match.image) swapImage(match.image);
    }
    window.__product.selectedSize = window.__attr1 + (window.__attr2 ? ' / '+window.__attr2 : '');
  }

  function swapImage(src) {
    var img = document.getElementById('prod-img');
    if (!img) return;
    img.style.transition = 'opacity 0.25s ease';
    img.style.opacity = '0';
    setTimeout(function(){ img.src = src; img.style.opacity = '1'; }, 250);
  }

  function handleAdd() {
    var p = window.__product;
    var qty = parseInt(document.getElementById('qty').value) || 1;
    var opts = p.options;
    var needsSel = (p.sizes && p.sizes.length > 0) || opts;

    if (needsSel) {
      var hasSel = p.selectedSize || false;
      if (!hasSel) {
        var req = document.getElementById('size-required');
        if (req) req.style.display = 'block';
        return;
      }
      /* Two-attr: need both selected */
      if (opts && opts.attr1_label && opts.attr2_label && !window.__attr2) {
        var req = document.getElementById('size-required');
        if (req) req.style.display = 'block';
        return;
      }
    }

    var cartP = Object.assign({}, p);
    if (p.__selectedPrice) cartP.price = p.__selectedPrice;
    addToCart(cartP, qty);
    var t = document.getElementById('toast');
    t.textContent = p.name + (p.selectedSize ? ' ('+p.selectedSize+')' : '') + ' added to cart';
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2800);
  }

  function formatDesc(d) {
    d = d.replace(/([a-zA-Z0-9,;.])\n([a-zA-Z])/g, '$1 $2');
    d = d.replace(/\n\n/g, '</p><p style="margin-top:12px">');
    d = d.replace(/\n/g, ' ');
    d = d.replace(/  +/g, ' ');
    return '<p style="margin:0">' + d + '</p>';
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
