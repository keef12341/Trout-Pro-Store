<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | Trout Pro Store</title>
  <meta name="description" content="Fly fishing tips, destinations, and stories from the Trout Pro Store team." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cellipse cx='30' cy='32' rx='22' ry='11' fill='%23c8860a'/%3E%3Cellipse cx='30' cy='35' rx='18' ry='6' fill='%23e8b84a'/%3E%3Cpath d='M52 32 L62 22 L64 32 L62 42 Z' fill='%23a06020'/%3E%3Ccircle cx='12' cy='31' r='3' fill='%23111'/%3E%3Ccircle cx='11' cy='30' r='1' fill='white'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+4:wght@300;400;600&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
</head>
<body>

<div id="header-mount"></div>

<div class="page-banner">
  <span class="section-tag" style="color:var(--water);display:block;margin-bottom:10px">Trout Pro Store</span>
  <h1>From the Blog</h1>
  <p>Fly fishing stories, tips, techniques, and destinations from our team of expert anglers.</p>
</div>

<main class="section">
  <div class="section-inner">
    <div class="filter-bar" id="tag-bar">
      <button class="filter-btn active" onclick="setTag('all',this)">All Posts</button>
      <button class="filter-btn" onclick="setTag('Technique',this)">Technique</button>
      <button class="filter-btn" onclick="setTag('Destinations',this)">Destinations</button>
      <button class="filter-btn" onclick="setTag('Flies',this)">Flies</button>
      <button class="filter-btn" onclick="setTag('Gear',this)">Gear</button>
      <button class="filter-btn" onclick="setTag('Rivers',this)">Rivers</button>
    </div>
    <div id="blog-grid" class="blog-grid">
      <div class="loading" style="grid-column:1/-1"><div class="spinner"></div>Loading posts…</div>
    </div>
  </div>
</main>

<div id="footer-mount"></div>

<script src="shared.js"></script>
<script>
  var allPosts   = [];
  var currentTag = 'all';

  document.getElementById('header-mount').innerHTML = renderHeader('Blog');
  document.getElementById('footer-mount').innerHTML = renderFooter();
  initHeader();

  sbGet('posts', 'published=eq.true&order=created_at.desc').then(function(data) {
    allPosts = data;
    renderPosts();
    initFadeUp();
  }).catch(function() {
    document.getElementById('blog-grid').innerHTML =
      '<div class="empty-state" style="grid-column:1/-1"><h3>No posts yet</h3><p>Check back soon.</p></div>';
  });

  function setTag(tag, btn) {
    currentTag = tag;
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderPosts();
  }

  function renderPosts() {
    var list = allPosts.filter(function(p) {
      return currentTag === 'all' || p.tag === currentTag;
    });
    if (!list.length) {
      document.getElementById('blog-grid').innerHTML =
        '<div class="empty-state" style="grid-column:1/-1"><h3>No posts found</h3><p>Try a different category.</p></div>';
      return;
    }
    document.getElementById('blog-grid').innerHTML = list.map(cardHTML).join('');
    initFadeUp();
  }

  function cardHTML(p) {
    var date = p.created_at ? new Date(p.created_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : '';
    var img  = p.image_url ? '<img src="' + p.image_url + '" alt="' + esc(p.title) + '" loading="lazy" />' : '';
    var preview = (p.content || '').replace(/<[^>]*>/g,'').substring(0,120);
    return '<article class="blog-card fade-up">'
      + '<div class="blog-card-img">' + img + '</div>'
      + '<div class="blog-card-body">'
      + '<div class="blog-card-tag">' + esc(p.tag || 'Article') + (date ? ' &middot; ' + date : '') + '</div>'
      + '<h2 class="blog-card-title">' + esc(p.title) + '</h2>'
      + '<p class="blog-card-desc">' + esc(preview) + (preview.length >= 120 ? '…' : '') + '</p>'
      + '<a href="post.html?id=' + p.id + '" class="blog-card-link">Read More &rarr;</a>'
      + '</div>'
      + '</article>';
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function initFadeUp() {
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, { threshold: 0.08 });
    document.querySelectorAll('.fade-up:not(.visible)').forEach(function(el) { obs.observe(el); });
  }
</script>
</body>
</html>
