<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | Trout Pro Store</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cellipse cx='30' cy='32' rx='22' ry='11' fill='%23c8860a'/%3E%3Cellipse cx='30' cy='35' rx='18' ry='6' fill='%23e8b84a'/%3E%3Cpath d='M52 32 L62 22 L64 32 L62 42 Z' fill='%23a06020'/%3E%3Ccircle cx='12' cy='31' r='3' fill='%23111'/%3E%3Ccircle cx='11' cy='30' r='1' fill='white'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+4:wght@300;400;600&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <!-- Square Web Payments SDK -->
  <script src="https://sandbox.web.squarecdn.com/v1/square.js"></script>
  <style>
    .checkout-wrap{display:grid;grid-template-columns:1fr 420px;gap:48px;max-width:1100px;margin:0 auto;padding:56px 40px}
    .form-section h2{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--forest);margin-bottom:20px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    .form-group{display:flex;flex-direction:column;margin-bottom:16px}
    .form-group label{font-family:'Fira Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);margin-bottom:6px}
    .form-group input,.form-group select{padding:12px 16px;border:1.5px solid var(--border);font-family:'Source Serif 4',serif;font-size:.95rem;outline:none;background:var(--white);color:var(--text);border-radius:2px;transition:border-color .2s}
    .form-group input:focus,.form-group select:focus{border-color:var(--gold)}
    .sq-wrap{border:1.5px solid var(--border);padding:14px 16px;border-radius:2px;background:var(--white);min-height:46px}
    .order-summary{background:var(--cream);border:1px solid var(--border);padding:28px;position:sticky;top:100px}
    .order-summary h2{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--forest);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .order-item{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.9rem}
    .order-item-name{color:var(--text-muted)}
    .order-item-qty{font-family:'Fira Mono',monospace;font-size:.72rem;color:var(--stone);margin-left:6px}
    .order-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
    .order-total-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:.95rem}
    .order-total-row.grand{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--forest);padding-top:14px;border-top:2px solid var(--border);margin-top:6px}
    .pay-btn{width:100%;padding:18px;background:var(--gold);color:var(--forest);border:none;font-family:'Source Serif 4',serif;font-weight:700;font-size:1rem;cursor:pointer;transition:background .2s;border-radius:2px;margin-top:20px}
    .pay-btn:hover{background:var(--gold-light)}
    .pay-btn:disabled{opacity:.6;cursor:not-allowed}
    #payment-error{color:#c85040;font-family:'Fira Mono',monospace;font-size:.78rem;margin-top:10px;display:none}
    .secure-note{font-family:'Fira Mono',monospace;font-size:.66rem;color:var(--stone);text-align:center;margin-top:12px}
    @media(max-width:860px){.checkout-wrap{grid-template-columns:1fr}.order-summary{position:static}}
    @media(max-width:540px){.checkout-wrap{padding:32px 20px}.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div id="header-mount"></div>
<div style="background:#1a2e1a;color:#e6b84a;text-align:center;padding:10px 20px;font-family:'Fira Mono',monospace;font-size:.78rem;letter-spacing:.06em">
  🎣 &nbsp; We're setting up our new store — ordering available very soon! &nbsp; 🎣
</div>


<div class="page-banner">
  <h1>Checkout</h1>
</div>

<main>
  <div class="checkout-wrap" id="checkout-body">
    <div class="loading" style="grid-column:1/-1"><div class="spinner"></div>Loading checkout…</div>
  </div>
</main>

<div id="footer-mount"></div>

<script src="shared.js"></script>
<script>
  document.getElementById('header-mount').innerHTML = renderHeader('');
  document.getElementById('footer-mount').innerHTML = renderFooter();
  initHeader();

  var cart = getCart();
  if (!cart.length) { location.href = 'cart.html'; }

  var subtotal = cart.reduce(function(s,i){ return s + i.price * i.qty; }, 0);
  var shipping = subtotal >= 75 ? 0 : 6.95;
  var total    = subtotal + shipping;

  /* Render page */
  var itemRows = cart.map(function(i) {
    return '<div class="order-item"><span class="order-item-name">' + esc(i.name) + '<span class="order-item-qty">x' + i.qty + '</span></span><span>$' + (i.price * i.qty).toFixed(2) + '</span></div>';
  }).join('');

  document.getElementById('checkout-body').innerHTML =
    /* Left — form */
    '<div class="form-section">'
    + '<h2>Contact &amp; Shipping</h2>'
    + '<div class="form-row">'
    + '<div class="form-group"><label>First Name</label><input type="text" id="fname" required /></div>'
    + '<div class="form-group"><label>Last Name</label><input type="text" id="lname" required /></div>'
    + '</div>'
    + '<div class="form-group"><label>Email</label><input type="email" id="email" required /></div>'
    + '<div class="form-group"><label>Address</label><input type="text" id="address" required /></div>'
    + '<div class="form-row">'
    + '<div class="form-group"><label>City</label><input type="text" id="city" required /></div>'
    + '<div class="form-group"><label>State</label><input type="text" id="state" maxlength="2" required /></div>'
    + '</div>'
    + '<div class="form-group"><label>ZIP Code</label><input type="text" id="zip" maxlength="10" required /></div>'
    + '<hr style="border:none;border-top:1px solid var(--border);margin:24px 0" />'
    + '<h2>Payment</h2>'
    + '<div class="form-group"><label>Card Number</label><div id="card-container" class="sq-wrap"></div></div>'
    + '<div id="payment-error"></div>'
    + '<button class="pay-btn" id="pay-btn" disabled style="background:#888;cursor:not-allowed">Checkout Temporarily Unavailable</button>'
    + '<div class="secure-note">&#x1F512; Secured by Square &middot; SSL Encrypted</div>'
    + '</div>'

    /* Right — order summary */
    + '<div class="order-summary">'
    + '<h2>Order Summary</h2>'
    + itemRows
    + '<hr class="order-divider" />'
    + '<div class="order-total-row"><span>Subtotal</span><span>$' + subtotal.toFixed(2) + '</span></div>'
    + '<div class="order-total-row"><span>Shipping</span><span>' + (shipping === 0 ? 'Free' : '$' + shipping.toFixed(2)) + '</span></div>'
    + '<div class="order-total-row grand"><span>Total</span><span>$' + total.toFixed(2) + '</span></div>'
    + '</div>';

  /* Initialize Square card */
  var squareCard;
  async function initSquare() {
    if (!window.Square) return;
    try {
      var payments = Square.payments(SQ_APP_ID, SQ_LOC_ID);
      squareCard = await payments.card();
      await squareCard.attach('#card-container');
    } catch(e) {
      console.error('Square init error:', e);
    }
  }
  initSquare();

  async function handlePay() {
    var btn = document.getElementById('pay-btn');
    var errEl = document.getElementById('payment-error');
    errEl.style.display = 'none';

    /* Validate form */
    var required = ['fname','lname','email','address','city','state','zip'];
    for (var i = 0; i < required.length; i++) {
      if (!document.getElementById(required[i]).value.trim()) {
        errEl.textContent = 'Please fill in all fields.';
        errEl.style.display = 'block';
        return;
      }
    }

    btn.disabled = true;
    btn.textContent = 'Processing…';

    try {
      /* Tokenize card */
      var result = await squareCard.tokenize();
      if (result.status !== 'OK') {
        throw new Error(result.errors ? result.errors[0].message : 'Card error');
      }

      /* Save order to Supabase */
      await sbPost('orders', {
        customer_name:  document.getElementById('fname').value + ' ' + document.getElementById('lname').value,
        customer_email: document.getElementById('email').value,
        items:          cart,
        total:          total,
        status:         'paid',
        square_token:   result.token
      });

      /* Clear cart and redirect to thank you */
      saveCart([]);
      location.href = 'thankyou.html';

    } catch(e) {
      errEl.textContent = e.message || 'Payment failed. Please try again.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Pay $' + total.toFixed(2);
    }
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
