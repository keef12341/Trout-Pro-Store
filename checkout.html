<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | Trout Pro Store</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cellipse cx='30' cy='32' rx='22' ry='11' fill='%23c8860a'/%3E%3Cellipse cx='30' cy='35' rx='18' ry='6' fill='%23e8b84a'/%3E%3Cpath d='M52 32 L62 22 L64 32 L62 42 Z' fill='%23a06020'/%3E%3Ccircle cx='12' cy='31' r='3' fill='%23111'/%3E%3Ccircle cx='11' cy='30' r='1' fill='white'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+4:wght@300;400;600&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <!-- Square Web Payments SDK -->
  <script src="https://web.squarecdn.com/v1/square.js"></script>
  <style>
    .checkout-wrap{display:grid;grid-template-columns:1fr 420px;gap:48px;max-width:1100px;margin:0 auto;padding:56px 40px}
    .form-section h2{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--forest);margin-bottom:20px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    .form-group{display:flex;flex-direction:column;margin-bottom:16px}
    .form-group label{font-family:'Fira Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);margin-bottom:6px}
    .form-group input,.form-group select{padding:12px 16px;border:1.5px solid var(--border);font-family:'Source Serif 4',serif;font-size:.95rem;outline:none;background:var(--white);color:var(--text);border-radius:2px;transition:border-color .2s}
    .form-group input:focus,.form-group select:focus{border-color:var(--gold)}
    .sq-wrap{border:1.5px solid var(--border);padding:14px 16px;border-radius:2px;background:var(--white);min-height:46px}
    .order-summary{background:var(--cream);border:1px solid var(--border);padding:28px;position:sticky;top:100px}
    .order-summary h2{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--forest);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .order-item{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.9rem}
    .order-item-name{color:var(--text-muted)}
    .order-item-qty{font-family:'Fira Mono',monospace;font-size:.72rem;color:var(--stone);margin-left:6px}
    .order-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
    .order-total-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:.95rem}
    .order-total-row.grand{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--forest);padding-top:14px;border-top:2px solid var(--border);margin-top:6px}
    .pay-btn{width:100%;padding:18px;background:var(--gold);color:var(--forest);border:none;font-family:'Source Serif 4',serif;font-weight:700;font-size:1rem;cursor:pointer;transition:background .2s;border-radius:2px;margin-top:20px}
    .pay-btn:hover{background:var(--gold-light)}
    .pay-btn:disabled{opacity:.6;cursor:not-allowed}
    #payment-error{color:#c85040;font-family:'Fira Mono',monospace;font-size:.78rem;margin-top:10px;display:none}
    .secure-note{font-family:'Fira Mono',monospace;font-size:.66rem;color:var(--stone);text-align:center;margin-top:12px}
    .promo-row{display:flex;gap:10px;margin-bottom:20px}
    .promo-row input{flex:1;padding:11px 16px;border:1.5px solid var(--border);font-family:'Source Serif 4',serif;font-size:.9rem;outline:none;border-radius:2px}
    .promo-row input:focus{border-color:var(--gold)}
    .promo-apply-btn{background:var(--forest);color:var(--cream);border:none;padding:11px 20px;font-family:'Fira Mono',monospace;font-size:.76rem;letter-spacing:.06em;cursor:pointer;border-radius:2px;white-space:nowrap}
    .promo-apply-btn:hover{background:var(--moss)}
    .promo-msg{font-family:'Fira Mono',monospace;font-size:.76rem;margin-bottom:12px;padding:8px 12px;border-radius:2px}
    .promo-msg.ok{background:rgba(45,122,58,.1);color:#2d7a3a;border:1px solid rgba(45,122,58,.25)}
    .promo-msg.err{background:rgba(200,80,60,.1);color:#c85040;border:1px solid rgba(200,80,60,.25)}
    @media(max-width:860px){.checkout-wrap{grid-template-columns:1fr}.order-summary{position:static}}
    @media(max-width:540px){.checkout-wrap{padding:32px 20px}.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div id="header-mount"></div>


<div class="page-banner">
  <h1>Checkout</h1>
</div>

<main>
  <div class="checkout-wrap" id="checkout-body">
    <div class="loading" style="grid-column:1/-1"><div class="spinner"></div>Loading checkout…</div>
  </div>
</main>

<div id="footer-mount"></div>

<script src="shared.js"></script>
<script>
  document.getElementById('header-mount').innerHTML = renderHeader('');
  document.getElementById('footer-mount').innerHTML = renderFooter();
  initHeader();

  var cart = getCart();
  if (!cart.length) { location.href = 'cart.html'; }

  var subtotal = cart.reduce(function(s,i){ return s + i.price * i.qty; }, 0);

  /* Shipping — flat rate, options coming soon */
  var SHIPPING_OPTIONS = [
    { id: 'standard', label: 'Standard Shipping (5-7 business days)', price: 6.95 },
    { id: 'free', label: 'Free Shipping (5-7 business days)', price: 0, minOrder: 75 }
  ];

  /* Tax rate — 7% default, recalculated when state is entered */
  /* Common US state tax rates */
  var STATE_TAX = {
    'AL':0.04,'AK':0,'AZ':0.056,'AR':0.065,'CA':0.0725,'CO':0.029,
    'CT':0.0635,'DE':0,'FL':0.06,'GA':0.04,'HI':0.04,'ID':0.06,
    'IL':0.0625,'IN':0.07,'IA':0.06,'KS':0.065,'KY':0.06,'LA':0.0445,
    'ME':0.055,'MD':0.06,'MA':0.0625,'MI':0.06,'MN':0.06875,'MS':0.07,
    'MO':0.04225,'MT':0,'NE':0.055,'NV':0.0685,'NH':0,'NJ':0.06625,
    'NM':0.05125,'NY':0.04,'NC':0.0475,'ND':0.05,'OH':0.0575,'OK':0.045,
    'OR':0,'PA':0.06,'RI':0.07,'SC':0.06,'SD':0.045,'TN':0.07,
    'TX':0.0625,'UT':0.0485,'VT':0.06,'VA':0.053,'WA':0.065,
    'WV':0.06,'WI':0.05,'WY':0.04,'DC':0.06
  };

  var selectedShipping = subtotal >= 75 ? 'free' : 'standard';

  function getShippingPrice() {
    var opt = SHIPPING_OPTIONS.find(function(o){ return o.id === selectedShipping; });
    return opt ? opt.price : 6.95;
  }

  function getTaxRate(stateCode) {
    return STATE_TAX[(stateCode||'').toUpperCase().trim()] || 0;
  }

  /* ── Promo codes — validated against Supabase, nothing hardcoded ── */
  var appliedPromo = null;

  async function applyPromo() {
    var code  = (document.getElementById('promo-input').value || '').trim().toUpperCase();
    var msgEl = document.getElementById('promo-msg');
    var btn   = document.querySelector('.promo-apply-btn');

    msgEl.style.display = 'none';
    msgEl.textContent   = '';

    if (!code) {
      msgEl.className     = 'promo-msg err';
      msgEl.textContent   = 'Please enter a promo code.';
      msgEl.style.display = 'block';
      return;
    }

    btn.textContent = 'Checking…';
    btn.disabled    = true;

    try {
      /* Look up code in Supabase — only active codes are returned by RLS */
      var data = await sbGet('promo_codes', 'code=eq.' + encodeURIComponent(code) + '&active=eq.true');

      if (!data || !data.length) {
        msgEl.className     = 'promo-msg err';
        msgEl.textContent   = 'Invalid or expired promo code.';
        msgEl.style.display = 'block';
        appliedPromo        = null;
        updateOrderSummary();
      } else {
        var p = data[0];
        appliedPromo = {
          type:     p.discount_type,
          discount: parseFloat(p.discount_value),
          label:    p.label || 'Discount applied'
        };
        msgEl.className     = 'promo-msg ok';
        msgEl.textContent   = '✓ ' + appliedPromo.label;
        msgEl.style.display = 'block';
        updateOrderSummary();
      }
    } catch(e) {
      msgEl.className     = 'promo-msg err';
      msgEl.textContent   = 'Could not validate code. Please try again.';
      msgEl.style.display = 'block';
    }

    btn.textContent = 'Apply';
    btn.disabled    = false;
  }

  function updateOrderSummary() {
    var stateVal  = (document.getElementById('state') || {value:''}).value;
    var shipping  = getShippingPrice();
    var taxRate   = getTaxRate(stateVal);
    var tax       = subtotal * taxRate;

    /* Apply promo discount */
    var discount = 0;
    if (appliedPromo) {
      if (appliedPromo.type === 'fixed') {
        /* Fixed price override — charge exactly that amount */
        discount = Math.max(0, subtotal + shipping + tax - appliedPromo.discount);
      } else if (appliedPromo.type === 'percent') {
        discount = subtotal * appliedPromo.discount;
      } else if (appliedPromo.type === 'shipping') {
        discount = shipping;
      }
    }

    var total = Math.max(0.01, subtotal + shipping + tax - discount);

    document.getElementById('sum-shipping').textContent = shipping === 0 ? 'Free' : '$' + shipping.toFixed(2);
    /* Show/hide discount row */
    var discRow = document.getElementById('sum-discount-row');
    if (discRow) {
      if (discount > 0) {
        discRow.style.display = 'flex';
        document.getElementById('sum-discount').textContent = '-$' + discount.toFixed(2);
      } else {
        discRow.style.display = 'none';
      }
    }
    document.getElementById('sum-tax').textContent = taxRate > 0
      ? '$' + tax.toFixed(2) + ' (' + (taxRate * 100).toFixed(2) + '%)'
      : stateVal.length === 2 ? 'No tax' : 'Enter state for tax';
    document.getElementById('sum-total').textContent = '$' + total.toFixed(2);
    var btn = document.getElementById('pay-btn');
    if (btn) btn.textContent = 'Pay $' + total.toFixed(2);
    return { shipping: shipping, tax: tax, total: total, taxRate: taxRate };
  }

  var itemRows = cart.map(function(i) {
    return '<div class="order-item"><span class="order-item-name">' + esc(i.name) + '<span class="order-item-qty"> x' + i.qty + '</span></span><span>$' + (i.price * i.qty).toFixed(2) + '</span></div>';
  }).join('');

  /* Build shipping options HTML */
  var shippingOpts = SHIPPING_OPTIONS.filter(function(o){
    return !o.minOrder || subtotal >= o.minOrder;
  }).map(function(o) {
    return '<label style="display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--border);margin-bottom:8px;cursor:pointer;border-radius:2px;transition:border-color .2s" class="ship-opt-label">'
      + '<input type="radio" name="shipping" value="' + o.id + '"' + (o.id === selectedShipping ? ' checked' : '') + ' onchange="selectedShipping=this.value;updateOrderSummary();highlightShipping()" style="accent-color:var(--forest)" />'
      + '<span style="flex:1;font-size:.88rem">' + o.label + '</span>'
      + '<strong>' + (o.price === 0 ? 'FREE' : '$' + o.price.toFixed(2)) + '</strong>'
      + '</label>';
  }).join('');

  document.getElementById('checkout-body').innerHTML =
    '<div class="form-section">'
    + '<h2>Contact &amp; Shipping</h2>'
    + '<div class="form-row">'
    + '<div class="form-group"><label>First Name</label><input type="text" id="fname" required /></div>'
    + '<div class="form-group"><label>Last Name</label><input type="text" id="lname" required /></div>'
    + '</div>'
    + '<div class="form-group"><label>Email</label><input type="email" id="email" required /></div>'
    + '<div class="form-group"><label>Address</label><input type="text" id="address" required /></div>'
    + '<div class="form-row">'
    + '<div class="form-group"><label>City</label><input type="text" id="city" required /></div>'
    + '<div class="form-group"><label>State</label><input type="text" id="state" maxlength="2" placeholder="TN" required oninput="updateOrderSummary()" /></div>'
    + '</div>'
    + '<div class="form-group"><label>ZIP Code</label><input type="text" id="zip" maxlength="10" required /></div>'
    + '<div style="background:var(--cream);border:1px solid var(--border);padding:14px 18px;margin-bottom:24px;font-family:Fira Mono,monospace;font-size:.82rem;color:var(--text-muted)">'
    + '<div style="background:var(--cream);border:1px solid var(--border);padding:14px 18px;margin-bottom:24px;font-family:Fira Mono,monospace;font-size:.82rem;color:var(--text-muted)" id="shipping-note"></div>'
    + '</div>'
    + '<hr style="border:none;border-top:1px solid var(--border);margin:24px 0" />'
    + '<h2>Payment</h2>'
    + '<div style="margin-bottom:20px"><div style="font-family:Fira Mono,monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);margin-bottom:8px">Promo Code</div><div class="promo-row"><input type="text" id="promo-input" placeholder="Enter promo code" /><button class="promo-apply-btn" onclick="applyPromo()">Apply</button></div><div class="promo-msg" id="promo-msg" style="display:none"></div></div>'
    + '<div class="form-group"><label>Card Details</label><div id="card-container" class="sq-wrap"></div></div>'
    + '<div id="payment-error"></div>'
    + '<button class="pay-btn" id="pay-btn" onclick="handlePay()">Complete Order</button>'
    + '<div class="secure-note">&#x1F512; Secured by Square &middot; SSL Encrypted</div>'
    + '</div>'

    + '<div class="order-summary">'
    + '<h2>Order Summary</h2>'
    + itemRows
    + '<hr class="order-divider" />'
    + '<div class="order-total-row"><span>Subtotal</span><span>$' + subtotal.toFixed(2) + '</span></div>'
    + '<div class="order-total-row"><span>Shipping</span><span id="sum-shipping">calculating…</span></div>'
    + '<div class="order-total-row" id="sum-discount-row" style="display:none;color:#2d7a3a"><span>Discount</span><span id="sum-discount"></span></div>'
    + '<div class="order-total-row"><span>Tax</span><span id="sum-tax">Enter state</span></div>'
    + '<div class="order-total-row grand"><span>Total</span><span id="sum-total">$' + subtotal.toFixed(2) + '</span></div>'
    + '</div>';

  /* Highlight selected shipping option */
  function highlightShipping() {
    document.querySelectorAll('.ship-opt-label').forEach(function(l) {
      var radio = l.querySelector('input[type=radio]');
      l.style.borderColor = radio && radio.checked ? 'var(--gold)' : 'var(--border)';
      l.style.background  = radio && radio.checked ? 'rgba(200,147,42,.05)' : '';
    });
  }

  /* Initial render */
  setTimeout(function() {
    updateOrderSummary();
    var note = document.getElementById('shipping-note');
    if (note) {
      note.textContent = subtotal >= 75
        ? 'Free shipping on your order!'
        : 'Shipping: $6.95 · Free on orders over $75';
    }
  }, 50);

  /* Initialize Square card */
  var squareCard;

  async function initSquare() {
    /* Wait for Square SDK to be ready */
    var attempts = 0;
    while (!window.Square && attempts < 20) {
      await new Promise(function(r){ setTimeout(r, 250); });
      attempts++;
    }
    if (!window.Square) {
      document.getElementById('card-container').innerHTML =
        '<p style="color:#c85040;font-family:Fira Mono,monospace;font-size:.8rem">Payment system failed to load. Please refresh the page.</p>';
      return;
    }
    try {
      var payments = Square.payments(SQ_APP_ID, SQ_LOC_ID);
      squareCard = await payments.card();
      await squareCard.attach('#card-container');
    } catch(e) {
      console.error('Square init error:', e);
      document.getElementById('card-container').innerHTML =
        '<p style="color:#c85040;font-family:Fira Mono,monospace;font-size:.8rem">Could not load payment form: ' + e.message + '</p>';
    }
  }

  /* Wait for DOM to be ready before init */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initSquare);
  } else {
    setTimeout(initSquare, 100);
  }

  async function handlePay() {
    var btn   = document.getElementById('pay-btn');
    var errEl = document.getElementById('payment-error');
    errEl.style.display = 'none';
    errEl.textContent   = '';

    /* Validate form */
    var required = ['fname','lname','email','address','city','state','zip'];
    for (var i = 0; i < required.length; i++) {
      if (!document.getElementById(required[i]).value.trim()) {
        errEl.textContent = 'Please fill in all required fields.';
        errEl.style.display = 'block';
        return;
      }
    }

    btn.disabled    = true;
    btn.textContent = 'Processing…';

    try {
      /* Step 1 — Tokenize the card via Square Web Payments SDK */
      var result = await squareCard.tokenize();
      if (result.status !== 'OK') {
        throw new Error(
          result.errors && result.errors[0]
            ? result.errors[0].message
            : 'Card error. Please check your details.'
        );
      }

      /* Step 2 — Calculate final order totals */
      var orderTotals = updateOrderSummary();

      /* Step 3 — Send token + amount to Supabase Edge Function
         The Edge Function holds the Square Access Token securely
         and processes the actual charge server-side */
      var edgeResp = await fetch(
        'https://elvbbqozynshrebfqkgf.supabase.co/functions/v1/process-payment',
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sourceId:      result.token,
            amount:        orderTotals.total,
            currency:      'USD',
            customerEmail: document.getElementById('email').value.trim(),
            note:          'Trout Pro Store — ' + cart.length + ' item(s)'
          })
        }
      );

      var edgeData = await edgeResp.json();

      if (!edgeResp.ok || !edgeData.success) {
        throw new Error(edgeData.error || 'Payment failed. Please try again.');
      }

      /* Step 4 — Save order to Supabase database */
      var orderResp = await fetch(SUPA_URL + '/rest/v1/orders', {
        method: 'POST',
        headers: {
          'apikey':        SUPA_ANON,
          'Authorization': 'Bearer ' + SUPA_ANON,
          'Content-Type':  'application/json',
          'Prefer':        'return=minimal'
        },
        body: JSON.stringify({
          customer_name:    document.getElementById('fname').value.trim() + ' ' + document.getElementById('lname').value.trim(),
          customer_email:   document.getElementById('email').value.trim(),
          items:            cart,
          total:            orderTotals.total,
          status:           'paid',
          square_order_id:  edgeData.paymentId,
          shipping_address: {
            address: document.getElementById('address').value.trim(),
            city:    document.getElementById('city').value.trim(),
            state:   document.getElementById('state').value.trim(),
            zip:     document.getElementById('zip').value.trim()
          }
        })
      });
      if (!orderResp.ok) {
        console.warn('Order save failed:', orderResp.status, 'but payment succeeded');
      }

      /* Step 5 — Clear cart and go to thank you page */
      saveCart([]);
      location.href = 'thankyou.html';

    } catch(e) {
      errEl.textContent   = e.message || 'Payment failed. Please try again.';
      errEl.style.display = 'block';
      btn.disabled        = false;
      var totals = updateOrderSummary();
      btn.textContent = 'Pay $' + totals.total.toFixed(2);
    }
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
