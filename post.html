<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post | Trout Pro Store</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cellipse cx='30' cy='32' rx='22' ry='11' fill='%23c8860a'/%3E%3Cellipse cx='30' cy='35' rx='18' ry='6' fill='%23e8b84a'/%3E%3Cpath d='M52 32 L62 22 L64 32 L62 42 Z' fill='%23a06020'/%3E%3Ccircle cx='12' cy='31' r='3' fill='%23111'/%3E%3Ccircle cx='11' cy='30' r='1' fill='white'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+4:wght@300;400;600&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .post-wrap{max-width:780px;margin:0 auto;padding:56px 40px}
    .post-tag{font-family:'Fira Mono',monospace;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--river-light);margin-bottom:14px}
    .post-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:900;color:var(--forest);line-height:1.15;margin-bottom:18px}
    .post-meta{font-family:'Fira Mono',monospace;font-size:.74rem;color:var(--stone);margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
    .post-hero{width:100%;aspect-ratio:16/9;object-fit:cover;margin-bottom:36px}
    .post-content{font-size:1.05rem;line-height:1.85;color:var(--text)}
    .post-content p{margin-bottom:1.4em}
    .post-content h2{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;margin:2em 0 .6em;color:var(--forest)}
    .post-content h3{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;margin:1.6em 0 .5em;color:var(--forest)}
    .post-content ul,.post-content ol{padding-left:1.4em;margin-bottom:1.4em}
    .post-content li{margin-bottom:.4em}
    .post-content img{max-width:100%;margin:1.6em 0;border:1px solid var(--border)}
    .post-back{display:inline-flex;align-items:center;gap:8px;font-family:'Fira Mono',monospace;font-size:.76rem;color:var(--stone);margin-bottom:28px;transition:color .2s}
    .post-back:hover{color:var(--forest)}
    @media(max-width:768px){.post-wrap{padding:36px 20px}}
  </style>
</head>
<body>

<div id="header-mount"></div>
<div id="post-mount">
  <div class="loading" style="padding:100px 20px"><div class="spinner"></div>Loading post…</div>
</div>
<div id="footer-mount"></div>

<script src="shared.js"></script>
<script>
  document.getElementById('header-mount').innerHTML = renderHeader('Blog');
  document.getElementById('footer-mount').innerHTML = renderFooter();
  initHeader();

  var id = new URLSearchParams(location.search).get('id');
  if (!id) { location.href = 'blog.html'; }

  sbGet('posts', 'id=eq.' + id + '&published=eq.true').then(function(data) {
    if (!data.length) { location.href = 'blog.html'; return; }
    var p = data[0];
    document.title = p.title + ' | Trout Pro Store';
    var date = p.created_at ? new Date(p.created_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : '';

    document.getElementById('post-mount').innerHTML =
      '<article class="post-wrap">'
      + '<a href="blog.html" class="post-back">&larr; Back to Blog</a>'
      + '<div class="post-tag">' + esc(p.tag || 'Article') + '</div>'
      + '<h1 class="post-title">' + esc(p.title) + '</h1>'
      + '<div class="post-meta">By Trout Pro Team' + (date ? ' &middot; ' + date : '') + '</div>'
      + (p.image_url ? '<img src="' + p.image_url + '" alt="' + esc(p.title) + '" class="post-hero" />' : '')
      + '<div class="post-content">' + (p.content || '<p>Content coming soon.</p>') + '</div>'
      + '</article>';
  });

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
